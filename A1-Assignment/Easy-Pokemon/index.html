<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pokemon Gen 1 - Pikachu</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  </head>

  <body>
    <main class="main_container">
      <!-- Left Section -->
      <section class="left_section">
        <header class="logo">
          <img src="./assets/images/pokemon_logo.png" alt="Pokemon Logo" />
        </header>

        <article class="pokemon_content">
          <span class="pokemon_gen">POKEMON GEN I</span>

          <h1>Pikachu</h1>

          <p>
            Pikachu is an Electric-type Pokémon introduced in Generation I.
            Pikachu are small, chubby,<br> and incredibly cute mouse-like Pokémon.<br>
            They are almost completely covered by <br> yellow fur.
          </p>

          <div class="counter">
            <span class="line"></span>
            <span class="count">01 / 08</span>
          </div>
        </article>

        <img
          src="./assets/images/pokeball.png"
          alt="Pokeball"
          class="pokeball"
        />
      </section>

      <!-- Right Section -->
      <section class="right_section">
        <button class="menu_btn">☰</button>

        <img src="./assets/images/pikachu_img.png" alt="Pikachu" class="pikachu" />

        <div class="dots">
          <span class="active"></span>
          <span></span>
          <span></span>
          <span></span>
          <span></span>

        </div>
      </section>
    </main>
  </body>
</html>
